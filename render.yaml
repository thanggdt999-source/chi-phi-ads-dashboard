services:
  - type: web
    name: chi-phi-ads-dashboard
    runtime: python
    rootDir: web_app
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: WEB_APP_SECRET_KEY
        generateValue: true
      - key: WEB_APP_USERNAME
        value: admin
      - key: WEB_APP_PASSWORD
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: INTERNAL_CRON_SECRET
        generateValue: true

  - type: cron
    name: chi-phi-ads-telegram-reports
    runtime: python
    rootDir: web_app
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py trigger-telegram-reports
    envVars:
      - key: TELEGRAM_REPORT_ENDPOINT
        value: https://ads.hexistoree.click/internal/telegram/reports/run
      - key: INTERNAL_CRON_SECRET
        fromService:
          name: chi-phi-ads-dashboard
          type: web
          envVarKey: INTERNAL_CRON_SECRET
