services:
  - type: web
    name: chi-phi-ads-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r web_app/requirements.txt
    startCommand: gunicorn web_app.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: WEB_APP_SECRET_KEY
        generateValue: true
      - key: USERS_CONFIG
        value: '{"admin_root":{"password":"Admin@Hexi2026!","role":"admin","display_name":"System Admin"},"lead_team_1":{"password":"LeadTeam1@2026","role":"lead","team":"TEAM_1","display_name":"Lead TEAM_1"},"lead_team_2":{"password":"LeadTeam2@2026","role":"lead","team":"TEAM_2","display_name":"Lead TEAM_2"},"lead_team_3":{"password":"LeadTeam3@2026","role":"lead","team":"TEAM_3","display_name":"Lead TEAM_3"},"lead_team_4":{"password":"LeadTeam4@2026","role":"lead","team":"TEAM_4","display_name":"Lead TEAM_4"},"lead_team_5":{"password":"LeadTeam5@2026","role":"lead","team":"TEAM_5","display_name":"Lead TEAM_5"}}'
      - key: WEB_APP_USERNAME
        value: admin
      - key: WEB_APP_PASSWORD
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: INTERNAL_CRON_SECRET
        generateValue: true
      - key: TELEGRAM_REPORT_INTERVAL_MINUTES
        value: "30"
      - key: TELEGRAM_REPORT_START_HOUR
        value: "6"
      - key: TELEGRAM_REPORT_START_MINUTE
        value: "0"
      - key: TELEGRAM_REPORT_END_HOUR
        value: "22"
      - key: TELEGRAM_REPORT_END_MINUTE
        value: "0"
      - key: TELEGRAM_REPORT_ALWAYS_ON
        value: "false"
      - key: TELEGRAM_REPORT_CATCHUP_MAX_SLOTS
        value: "24"
      - key: TELEGRAM_SELF_SCHEDULER_ENABLED
        value: "true"
      - key: TELEGRAM_SELF_SCHEDULER_TICK_SECONDS
        value: "25"
      - key: GROQ_API_KEY
        sync: false
      - key: AI_CHAT_ENABLED
        value: "true"
      - key: AI_CHAT_MODEL
        value: "llama-3.1-8b-instant"
      - key: AI_CHAT_MAX_TOKENS
        value: "500"

  - type: cron
    name: chi-phi-ads-telegram-cron
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install --disable-pip-version-check --quiet requests
    startCommand: >-
      python -c "import os, requests; r=requests.post(os.environ['TELEGRAM_REPORT_ENDPOINT'],
      headers={'Authorization': f\"Bearer {os.environ['INTERNAL_CRON_SECRET']}\", 'Content-Type': 'application/json'},
      json={'force': False}, timeout=60); print(r.status_code, r.text); r.raise_for_status()"
    envVars:
      - key: INTERNAL_CRON_SECRET
        sync: false
      - key: TELEGRAM_REPORT_ENDPOINT
        value: https://ads.hexistoree.click/internal/telegram/reports/run
