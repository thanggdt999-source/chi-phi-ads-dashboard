<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký nhân viên - Chi Phí Ads Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(56,189,248,0.16), transparent 24%),
                linear-gradient(135deg, #5b6ee1 0%, #6c63d7 45%, #5f76d9 100%);
            color: #0f172a;
        }

        .register-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .register-card {
            width: 100%;
            max-width: 760px;
            display: grid;
            grid-template-columns: 1fr;
            overflow: hidden;
            border-radius: 32px;
            background: rgba(255,255,255,0.97);
            border: 1px solid rgba(255,255,255,0.34);
            box-shadow: 0 36px 100px rgba(15, 23, 42, 0.28);
        }

        .register-brand {
            padding: 42px 36px;
            background: linear-gradient(160deg, #0f172a, #1d4ed8 58%, #38bdf8 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .register-brand h1 {
            margin: 24px 0 14px;
            font-size: 2.4rem;
            line-height: 1.1;
        }

        .register-brand p {
            margin: 0;
            color: rgba(226, 232, 240, 0.88);
            line-height: 1.7;
            font-size: 1rem;
            max-width: 400px;
        }

        .brand-list {
            margin-top: 28px;
            display: grid;
            gap: 14px;
        }

        .brand-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            color: #e2e8f0;
        }

        .brand-item i {
            margin-top: 4px;
            color: #93c5fd;
        }

        .register-form-wrap {
            padding: 34px 32px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.94));
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .form-accent {
            width: 72px;
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, #38bdf8, #2563eb);
            margin-bottom: 20px;
        }

        .form-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1890e8;
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #64748b;
            line-height: 1.7;
            max-width: 520px;
            margin-bottom: 18px;
        }

        .board-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid rgba(52, 152, 219, 0.24);
            color: #1f4f75;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .field label {
            display: block;
            font-size: 0.86rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            background: #f8fbff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .field small {
            display: block;
            color: #64748b;
            margin-top: 7px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-weight: 700;
            font-size: 0.98rem;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2563eb);
            color: #fff;
            box-shadow: 0 16px 34px rgba(37, 99, 235, 0.22);
        }

        .btn-secondary {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        @media (max-width: 860px) {
            .register-card {
                grid-template-columns: 1fr;
            }

            .register-brand,
            .register-form-wrap {
                padding: 28px 22px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-shell">
        <div class="register-card">
            <section class="register-form-wrap">
                <a href="{{ url_for('login') }}" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
                {% if error %}
                <div class="alert alert-error">{{ error }}</div>
                {% endif %}

                <form method="post" action="{{ url_for('register_employee') }}">
                    <div class="form-grid">
                        <div class="field">
                            <label>Tên đăng nhập</label>
                            <input type="text" name="username" value="{{ form_values.username }}" placeholder="vd: emp_thang" required autocomplete="username">
                        </div>
                        <div class="field">
                            <label>Họ tên hiển thị</label>
                            <input type="text" name="display_name" value="{{ form_values.display_name }}" placeholder="vd: Nguyễn Bá Thắng" required>
                        </div>
                        <div class="field">
                            <label>Mật khẩu</label>
                            <input type="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="new-password">
                        </div>
                        <div class="field">
                            <label>Xác nhận mật khẩu</label>
                            <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
                        </div>
                        <div class="field">
                            <label>Team</label>
                            <select name="team" required>
                                <option value="">-- Chọn team --</option>
                                {% for t in team_codes %}
                                <option value="{{ t }}" {% if form_values.team == t %}selected{% endif %}>{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="field">
                            <label>Link Google Sheet</label>
                            <input type="text" name="sheet_url" value="{{ form_values.sheet_url }}" placeholder="https://docs.google.com/spreadsheets/d/..." required>
                            <small>Link này sẽ được dùng để mở đúng dữ liệu quảng cáo của tài khoản nhân viên sau khi đăng nhập.</small>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-user-check"></i> Tạo tài khoản và quay về đăng nhập</button>
                        <a href="{{ url_for('login') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Trở lại login</a>
                    </div>
                </form>
            </section>
        </div>
    </div>
</body>
</html>
